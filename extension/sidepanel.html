<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Tab Out Panel</title>
  <link rel="stylesheet" href="sidepanel.css">
  <script src="theme-init.js"></script>
</head>
<body>
  <header class="panel-header">
    <div>
      <div class="panel-brand">Super Tab Out</div>
      <h1>Command Center</h1>
    </div>
    <button class="icon-btn" id="refreshBtn" title="Refresh" aria-label="Refresh side panel">↻</button>
  </header>

  <nav class="panel-tabs" aria-label="Side panel views">
    <button class="panel-tab active" data-view="tabs">Tabs</button>
    <button class="panel-tab" data-view="tools">Tools</button>
  </nav>

  <main>
    <section class="panel-view active" id="tabsView">
      <div class="search-row">
        <input id="panelSearch" type="search" placeholder="Search tabs, saved items, sessions" autocomplete="off" aria-label="Search tabs saved items and sessions">
        <button id="saveSessionBtn">Save</button>
      </div>
      <div class="quick-actions">
        <button id="dedupeBtn">Clean duplicates</button>
        <button id="newTabBtn">New tab dashboard</button>
      </div>
      <div class="result-list" id="resultList"></div>
      <section class="panel-section">
        <div class="panel-section-title">Recently closed</div>
        <div class="recent-list" id="recentList"></div>
      </section>
    </section>

    <section class="panel-view" id="healthView" hidden>
      <div class="health-score">
        <div class="health-number" id="healthScore">—</div>
        <div class="health-label">Tab health</div>
      </div>
      <div class="metric-grid">
        <div><strong id="metricTabs">—</strong><span>Open tabs</span></div>
        <div><strong id="metricDupes">—</strong><span>Duplicate extras</span></div>
        <div><strong id="metricClosed">—</strong><span>Closed this week</span></div>
        <div><strong id="metricSaved">—</strong><span>Saved this week</span></div>
      </div>
      <section class="panel-section">
        <div class="panel-section-title">Top domains</div>
        <div id="topDomains" class="compact-list"></div>
      </section>
      <section class="panel-section">
        <div class="panel-section-title">Achievements</div>
        <div id="achievements" class="achievement-list"></div>
      </section>
    </section>

    <section class="panel-view" id="toolsView">
      <div class="tool-search-row">
        <input id="toolSearch" type="search" placeholder="Search tools" autocomplete="off" aria-label="Search tools">
        <button id="openToolsPageBtn">Full page</button>
      </div>
      <div class="tool-context-card">
        <div class="panel-section-title" data-tool-copy="currentTabTools">Current tab tools</div>
        <div class="tool-actions">
          <button data-action="open-tool-current" data-tool-id="url">URL</button>
          <button data-action="open-tool-current" data-tool-id="qr">QR</button>
          <button data-action="open-tool-current" data-tool-id="hash">Hash</button>
        </div>
      </div>
      <section class="panel-section">
        <div class="panel-section-title" data-tool-copy="allTools">All tools</div>
        <div id="toolList" class="tool-list"></div>
      </section>
    </section>
  </main>

  <div class="panel-toast" id="panelToast"></div>

  <script src="services/storage-service.js"></script>
  <script src="services/html-service.js"></script>
  <script src="services/tabs-service.js"></script>
  <script src="services/search-service.js"></script>
  <script src="services/metrics-service.js"></script>
  <script src="services/tools-service.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
